<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>German Verb Learning - Haben</title>
    <style>
        :root {
            --primary-gradient-start: #667eea;
            --primary-gradient-end: #764ba2;
            --header-bg: rgba(255, 255, 255, 0.15);
            --header-border: rgba(255, 255, 255, 0.1);
            --text-color-dark: #333;
            --text-color-light: white;
            --shadow-light: rgba(0,0,0,0.4);
            --card-bg-light: rgba(255, 255, 255, 0.95);
            --card-shadow: rgba(0,0,0,0.15);
            --card-border: rgba(255, 255, 255, 0.2);
            --accent-color: #4c51bf;
            --accent-gradient-start: #a78bfa;
            --accent-gradient-end: #c084fc;
            --english-gradient-start: #60a5fa;
            --english-gradient-end: #3b82f6;
            --spanish-gradient-start: #fbbf24;
            --spanish-gradient-end: #f59e0b;
            --audio-btn-bg: rgba(255, 255, 255, 0.9);
            --audio-btn-color: #4c51bf;
            --audio-btn-shadow: rgba(0,0,0,0.1);
            --nav-btn-shadow: rgba(76, 81, 191, 0.3);
            --nav-btn-disabled: #9ca3af;
            --page-indicator-bg: rgba(255, 255, 255, 0.95);
            --url-bar-bg: rgba(255, 255, 255, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, var(--primary-gradient-start), var(--primary-gradient-end));
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: var(--text-color-dark);
        }

        .header {
            background: var(--header-bg);
            padding: 20px;
            text-align: center;
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--header-border);
        }

        .verb-title {
            font-size: 2.8rem;
            font-weight: bold;
            color: var(--text-color-light);
            text-shadow: 0 3px 6px var(--shadow-light);
            margin-bottom: 10px;
        }

        .verb-meaning {
            font-size: 1.6rem;
            color: rgba(255, 255, 255, 0.95);
            font-weight: 300;
        }

        .main-content {
            flex: 1;
            padding: 35px 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .pronoun-section,
        .additional-sentences {
            background: var(--card-bg-light);
            border-radius: 25px;
            padding: 35px;
            box-shadow: 0 15px 40px var(--card-shadow);
            margin-bottom: 35px;
            border: 1px solid var(--card-border);
        }

        .pronoun-title,
        .section-title {
            text-align: center;
            font-size: 2.2rem;
            font-weight: bold;
            margin-bottom: 35px;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .section-title {
            font-size: 1.7rem;
            margin-bottom: 25px;
            letter-spacing: 1px;
        }

        .sentence-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 25px;
            margin-bottom: 18px;
            border-radius: 18px;
            font-size: 1.4rem;
            font-weight: 500;
            transition: all 0.3s ease;
            cursor: pointer;
            border: 2px solid transparent;
        }

        .sentence-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px var(--card-shadow);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .german { 
            background: linear-gradient(135deg, var(--accent-gradient-start), var(--accent-gradient-end));
            color: var(--text-color-light);
        }
        .english { 
            background: linear-gradient(135deg, var(--english-gradient-start), var(--english-gradient-end));
            color: var(--text-color-light);
        }
        .spanish { 
            background: linear-gradient(135deg, var(--spanish-gradient-start), var(--spanish-gradient-end));
            color: var(--text-color-light);
        }

        .flag {
            font-size: 1.8rem;
            margin-right: 18px;
        }

        .audio-btn {
            background: var(--audio-btn-bg);
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            color: var(--audio-btn-color);
            font-size: 1.3rem;
            box-shadow: 0 4px 15px var(--audio-btn-shadow);
            flex-shrink: 0;
        }

        .audio-btn:hover {
            background: var(--accent-color);
            color: var(--text-color-light);
            transform: scale(1.15);
            box-shadow: 0 6px 20px rgba(76, 81, 191, 0.3);
        }

        .audio-btn:active {
            background: #10b981;
            transform: scale(1.05);
        }

        .navigation {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 25px;
        }

        .nav-btn {
            background: linear-gradient(135deg, var(--accent-color), var(--primary-gradient-start));
            color: var(--text-color-light);
            border: none;
            padding: 18px 30px;
            border-radius: 30px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 6px 20px var(--nav-btn-shadow);
        }

        .nav-btn:hover {
            background: linear-gradient(135deg, var(--primary-gradient-start), var(--primary-gradient-end));
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(76, 81, 191, 0.4);
        }

        .nav-btn:disabled {
            background: var(--nav-btn-disabled);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .page-indicator {
            background: var(--page-indicator-bg);
            padding: 12px 25px;
            border-radius: 25px;
            font-weight: bold;
            color: var(--accent-color);
            box-shadow: 0 4px 15px var(--audio-btn-shadow);
            font-size: 1.1rem;
        }

        .url-bar {
            background: var(--url-bar-bg);
            padding: 15px 25px;
            border-radius: 25px;
            font-size: 1.1rem;
            color: var(--text-color-light);
            text-align: center;
            margin-top: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid var(--header-border);
        }

        @media (max-width: 480px) {
            .verb-title { font-size: 2.2rem; }
            .pronoun-title { font-size: 1.8rem; }
            .sentence-card { font-size: 1.2rem; padding: 20px; }
            .main-content { padding: 25px 15px; }
            .pronoun-section, .additional-sentences { padding: 25px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="verb-title">🤝 haben</div>
        <div class="verb-meaning">– to have</div>
    </div>

    <div class="main-content">
        <div class="pronoun-section">
            <div class="pronoun-title" id="pronoun-display">ICH</div>
            
            <div class="sentence-card german" id="german-sentence-card">
                <div>
                    <span class="flag">🇩🇪</span>
                    <span class="sentence-text">Ich habe ein Auto.</span>
                </div>
                <button class="audio-btn" aria-label="Play German sentence">🔊</button>
            </div>

            <div class="sentence-card english" id="english-sentence-card">
                <div>
                    <span class="flag">🇺🇸</span>
                    <span class="sentence-text">I have a car.</span>
                </div>
                <button class="audio-btn" aria-label="Play English sentence">🔊</button>
            </div>

            <div class="sentence-card spanish" id="spanish-sentence-card">
                <div>
                    <span class="flag">🇪🇸</span>
                    <span class="sentence-text">Yo tengo un coche.</span>
                </div>
                <button class="audio-btn" aria-label="Play Spanish sentence">🔊</button>
            </div>
        </div>

        <div class="additional-sentences">
            <div class="section-title">Possession & Having (General Examples)</div>
            
            <div class="sentence-card english" onclick="playAudio('having-good-friends-en')">
                <div>
                    <span class="flag">🇺🇸</span>
                    Having good friends is important.
                </div>
                <button class="audio-btn" aria-label="Play English example sentence">🔊</button>
            </div>

            <div class="sentence-card spanish" onclick="playAudio('tener-buenos-amigos-es')">
                <div>
                    <span class="flag">🇪🇸</span>
                    Tener buenos amigos es importante.
                </div>
                <button class="audio-btn" aria-label="Play Spanish example sentence">🔊</button>
            </div>

            <div class="sentence-card german" onclick="playAudio('gute-freunde-haben-de')">
                <div>
                    <span class="flag">🇩🇪</span>
                    Gute Freunde zu haben ist wichtig.
                </div>
                <button class="audio-btn" aria-label="Play German example sentence">🔊</button>
            </div>
        </div>

        <div class="navigation">
            <button class="nav-btn" onclick="previousPage()">⬅️ Anterior</button>
            <div class="page-indicator">1 / 6</div>
            <button class="nav-btn" onclick="nextPage()">Siguiente ➡️</button>
        </div>

        <div class="url-bar">giomont.github.io/lang/haben.html</div>
    </div>

    <script>
        // Conjugation data for haben with all 6 pronouns
        const conjugationData = [
            {
                pronoun: "ICH",
                german: { text: "Ich habe ein Auto.", audioId: "ich-habe-ein-auto" },
                english: { text: "I have a car.", audioId: "i-have-a-car" },
                spanish: { text: "Yo tengo un coche.", audioId: "yo-tengo-un-coche" }
            },
            {
                pronoun: "DU",
                german: { text: "Du hast einen Hund.", audioId: "du-hast-einen-hund" },
                english: { text: "You have a dog.", audioId: "you-have-a-dog" },
                spanish: { text: "Tú tienes un perro.", audioId: "tu-tienes-un-perro" }
            },
            {
                pronoun: "ER/SIE/ES",
                german: { text: "Sie hat eine Katze.", audioId: "sie-hat-eine-katze" },
                english: { text: "She has a cat.", audioId: "she-has-a-cat" },
                spanish: { text: "Ella tiene un gato.", audioId: "ella-tiene-un-gato" }
            },
            {
                pronoun: "WIR",
                german: { text: "Wir haben Zeit.", audioId: "wir-haben-zeit" },
                english: { text: "We have time.", audioId: "we-have-time" },
                spanish: { text: "Nosotros tenemos tiempo.", audioId: "nosotros-tenemos-tiempo" }
            },
            {
                pronoun: "IHR",
                german: { text: "Ihr habt Glück.", audioId: "ihr-habt-glueck" },
                english: { text: "You all have luck.", audioId: "you-all-have-luck" },
                spanish: { text: "Vosotros tenéis suerte.", audioId: "vosotros-teneis-suerte" }
            },
            {
                pronoun: "SIE",
                german: { text: "Sie haben Hunger.", audioId: "sie-haben-hunger" },
                english: { text: "They have hunger.", audioId: "they-have-hunger" },
                spanish: { text: "Ellos tienen hambre.", audioId: "ellos-tienen-hambre" }
            }
        ];

        let currentPage = 0;
        const totalPages = conjugationData.length;

        // Audio texts and languages for all phrases
        const audioTexts = {
            // ICH
            'ich-habe-ein-auto': { text: 'Ich habe ein Auto.', lang: 'de-DE' },
            'i-have-a-car': { text: 'I have a car.', lang: 'en-US' },
            'yo-tengo-un-coche': { text: 'Yo tengo un coche.', lang: 'es-ES' },
            
            // DU
            'du-hast-einen-hund': { text: 'Du hast einen Hund.', lang: 'de-DE' },
            'you-have-a-dog': { text: 'You have a dog.', lang: 'en-US' },
            'tu-tienes-un-perro': { text: 'Tú tienes un perro.', lang: 'es-ES' },
            
            // ER/SIE/ES
            'sie-hat-eine-katze': { text: 'Sie hat eine Katze.', lang: 'de-DE' },
            'she-has-a-cat': { text: 'She has a cat.', lang: 'en-US' },
            'ella-tiene-un-gato': { text: 'Ella tiene un gato.', lang: 'es-ES' },
            
            // WIR
            'wir-haben-zeit': { text: 'Wir haben Zeit.', lang: 'de-DE' },
            'we-have-time': { text: 'We have time.', lang: 'en-US' },
            'nosotros-tenemos-tiempo': { text: 'Nosotros tenemos tiempo.', lang: 'es-ES' },
            
            // IHR
            'ihr-habt-glueck': { text: 'Ihr habt Glück.', lang: 'de-DE' },
            'you-all-have-luck': { text: 'You all have luck.', lang: 'en-US' },
            'vosotros-teneis-suerte': { text: 'Vosotros tenéis suerte.', lang: 'es-ES' },
            
            // SIE (plural)
            'sie-haben-hunger': { text: 'Sie haben Hunger.', lang: 'de-DE' },
            'they-have-hunger': { text: 'They have hunger.', lang: 'en-US' },
            'ellos-tienen-hambre': { text: 'Ellos tienen hambre.', lang: 'es-ES' },
            
            // Practice sentences
            'having-good-friends-en': { text: 'Having good friends is important.', lang: 'en-US' },
            'tener-buenos-amigos-es': { text: 'Tener buenos amigos es importante.', lang: 'es-ES' },
            'gute-freunde-haben-de': { text: 'Gute Freunde zu haben ist wichtig.', lang: 'de-DE' }
        };

        // DOM elements cache
        const pronounDisplay = document.getElementById('pronoun-display');
        const germanSentenceCard = document.getElementById('german-sentence-card');
        const englishSentenceCard = document.getElementById('english-sentence-card');
        const spanishSentenceCard = document.getElementById('spanish-sentence-card');
        const pageIndicator = document.querySelector('.page-indicator');
        const prevBtn = document.querySelector('.nav-btn:first-child');
        const nextBtn = document.querySelector('.nav-btn:last-child');

        function updatePage() {
            const data = conjugationData[currentPage];
            
            // Update pronoun title
            pronounDisplay.textContent = data.pronoun;
            
            // Update main sentences and attach audio handlers
            // German card
            germanSentenceCard.querySelector('.sentence-text').textContent = data.german.text;
            germanSentenceCard.querySelector('.audio-btn').onclick = () => playAudio(data.german.audioId);
            germanSentenceCard.querySelector('.audio-btn').setAttribute('aria-label', `Play German: ${data.german.text}`);

            // English card
            englishSentenceCard.querySelector('.sentence-text').textContent = data.english.text;
            englishSentenceCard.querySelector('.audio-btn').onclick = () => playAudio(data.english.audioId);
            englishSentenceCard.querySelector('.audio-btn').setAttribute('aria-label', `Play English: ${data.english.text}`);

            // Spanish card
            spanishSentenceCard.querySelector('.sentence-text').textContent = data.spanish.text;
            spanishSentenceCard.querySelector('.audio-btn').onclick = () => playAudio(data.spanish.audioId);
            spanishSentenceCard.querySelector('.audio-btn').setAttribute('aria-label', `Play Spanish: ${data.spanish.text}`);
            
            // Update page indicator
            pageIndicator.textContent = `${currentPage + 1} / ${totalPages}`;
            
            // Update navigation buttons
            prevBtn.disabled = currentPage === 0;
            nextBtn.disabled = currentPage === totalPages - 1;
        }

        // Voice cache to prevent repeated fetching
        let voicesLoaded = false;
        let availableVoices = [];

        function loadVoices() {
            availableVoices = speechSynthesis.getVoices();
            if (availableVoices.length > 0) {
                voicesLoaded = true;
                console.log('Voices loaded successfully.');
                speechSynthesis.onvoiceschanged = null; 
            } else {
                console.log('Still waiting for voices to load...');
            }
        }

        if ('speechSynthesis' in window) {
            speechSynthesis.onvoiceschanged = loadVoices;
            loadVoices(); 

            let audioInitiated = false;
            const initSpeechSynthesis = () => {
                if (!audioInitiated && voicesLoaded) {
                    const dummyUtterance = new SpeechSynthesisUtterance('');
                    dummyUtterance.volume = 0;
                    speechSynthesis.speak(dummyUtterance);
                    audioInitiated = true;
                    console.log('Speech Synthesis initiated by user gesture.');
                    document.removeEventListener('click', initSpeechSynthesis);
                    document.removeEventListener('touchstart', initSpeechSynthesis);
                }
            };
            document.addEventListener('click', initSpeechSynthesis, { once: true });
            document.addEventListener('touchstart', initSpeechSynthesis, { once: true });

        } else {
            console.warn('Speech Synthesis not supported in this browser.');
            document.querySelectorAll('.audio-btn').forEach(btn => {
                btn.style.opacity = 0.5;
                btn.style.cursor = 'not-allowed';
                btn.title = 'Audio not supported';
            });
        }

        function playAudio(audioId) {
            console.log('Attempting to play audio for ID:', audioId);
            const audioData = audioTexts[audioId];

            if (!audioData) {
                console.error('Audio data not found for ID:', audioId);
                return;
            }

            if ('speechSynthesis' in window && voicesLoaded) {
                speechSynthesis.cancel();

                const utterance = new SpeechSynthesisUtterance(audioData.text);
                utterance.lang = audioData.lang;
                utterance.rate = 0.8;
                utterance.pitch = 1;
                utterance.volume = 1;

                // Find the best voice for the language
                const voice = availableVoices.find(v => v.lang.startsWith(audioData.lang.split('-')[0]));
                if (voice) {
                    utterance.voice = voice;
                }

                utterance.onstart = () => {
                    console.log(`Started speaking: ${audioData.text}`);
                };

                utterance.onend = () => {
                    console.log(`Finished speaking: ${audioData.text}`);
                };

                utterance.onerror = (event) => {
                    console.error('Speech synthesis error:', event.error);
                };

                speechSynthesis.speak(utterance);
            } else {
                console.warn('Speech synthesis not available or voices not loaded yet.');
            }
        }

        function nextPage() {
            if (currentPage < totalPages - 1) {
                currentPage++;
                updatePage();
            }
        }

        function previousPage() {
            if (currentPage > 0) {
                currentPage--;
                updatePage();
            }
        }

        // Initialize the page
        updatePage();

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') {
                previousPage();
            } else if (e.key === 'ArrowRight') {
                nextPage();
            }
        });
    </script>
</body>
</html>
