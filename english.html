<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English for Travelers</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;500;600&display=swap');

  :root {
    --verde-bosque: #1E3A2B;
    --verde-musgo: #2D5A3D;
    --verde-claro: #5A8C6A;
    --dorado: #C8A84B;
    --crema: #F5F0E8;
    --blanco: #FDFCFA;
    --gris: #6B7280;
    --negro: #111813;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--crema);
    color: var(--negro);
    min-height: 100vh;
  }

  /* HERO */
  .hero {
    background: var(--verde-bosque);
    padding: 48px 24px 40px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 60% 0%, rgba(200,168,75,0.12) 0%, transparent 65%);
  }
  .hero-eyebrow {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--dorado);
    margin-bottom: 12px;
    font-weight: 600;
  }
  .hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(28px, 6vw, 52px);
    color: var(--blanco);
    line-height: 1.1;
    margin-bottom: 10px;
  }
  .hero h1 span { color: var(--dorado); }
  .hero-sub {
    font-size: 14px;
    color: rgba(255,255,255,0.55);
    font-weight: 300;
    margin-bottom: 28px;
  }
  .badge-count {
    display: inline-block;
    background: var(--dorado);
    color: var(--verde-bosque);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 5px 14px;
    border-radius: 20px;
  }

  /* FILTROS */
  .filters {
    padding: 20px 16px 0;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    max-width: 780px;
    margin: 0 auto;
  }
  .filter-btn {
    border: 1.5px solid transparent;
    background: var(--blanco);
    color: var(--gris);
    font-size: 12px;
    font-weight: 500;
    padding: 7px 14px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Inter', sans-serif;
    letter-spacing: 0.3px;
  }
  .filter-btn:hover { border-color: var(--verde-claro); color: var(--verde-bosque); }
  .filter-btn.active {
    background: var(--verde-bosque);
    color: var(--blanco);
    border-color: var(--verde-bosque);
  }

  /* BÚSQUEDA */
  .search-wrap {
    max-width: 480px;
    margin: 16px auto 0;
    padding: 0 16px;
  }
  .search-input {
    width: 100%;
    padding: 10px 16px;
    border: 1.5px solid #DDD6CC;
    border-radius: 24px;
    font-size: 13px;
    font-family: 'Inter', sans-serif;
    background: var(--blanco);
    color: var(--negro);
    outline: none;
    transition: border-color 0.2s;
  }
  .search-input:focus { border-color: var(--verde-claro); }
  .search-input::placeholder { color: #AAA; }

  /* CATEGORÍAS */
  .content {
    max-width: 820px;
    margin: 0 auto;
    padding: 24px 16px 48px;
  }

  .category {
    margin-bottom: 32px;
  }
  .category-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
    padding-bottom: 10px;
    border-bottom: 2px solid var(--verde-bosque);
  }
  .category-icon {
    width: 36px;
    height: 36px;
    background: var(--verde-bosque);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 17px;
    flex-shrink: 0;
  }
  .category-title {
    font-family: 'Playfair Display', serif;
    font-size: 19px;
    color: var(--verde-bosque);
  }
  .category-subtitle {
    font-size: 11px;
    color: var(--gris);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-left: auto;
    font-weight: 500;
  }

  /* TARJETAS */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 10px;
  }
  .card {
    background: var(--blanco);
    border-radius: 10px;
    padding: 14px 16px;
    border: 1px solid #E8E2D8;
    transition: box-shadow 0.2s, transform 0.15s;
    cursor: default;
    position: relative;
  }
  .card:hover {
    box-shadow: 0 4px 16px rgba(30,58,43,0.1);
    transform: translateY(-1px);
  }
  .card-num {
    font-size: 10px;
    color: var(--dorado);
    font-weight: 700;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }
  .card-de {
    font-size: 14px;
    font-weight: 600;
    color: var(--negro);
    margin-bottom: 5px;
    line-height: 1.4;
  }
  .card-es {
    font-size: 12px;
    color: var(--gris);
    font-weight: 400;
    line-height: 1.4;
  }
  /* BOTONES DE ACCIÓN */
  .card-actions {
    display: flex;
    gap: 6px;
    margin-top: 10px;
    align-items: center;
  }
  .audio-btn {
    display: flex;
    align-items: center;
    gap: 5px;
    background: var(--verde-bosque);
    color: var(--blanco);
    border: none;
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 11px;
    font-weight: 600;
    font-family: 'Inter', sans-serif;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    flex-shrink: 0;
  }
  .audio-btn:hover { background: var(--verde-musgo); }
  .audio-btn:active { transform: scale(0.95); }
  .audio-btn.playing {
    background: var(--dorado);
    color: var(--verde-bosque);
  }
  .audio-btn svg {
    width: 11px;
    height: 11px;
    fill: currentColor;
    flex-shrink: 0;
  }
  .copy-btn {
    background: none;
    border: 1px solid #DDD6CC;
    border-radius: 20px;
    cursor: pointer;
    font-size: 11px;
    color: var(--gris);
    padding: 5px 10px;
    transition: all 0.2s;
    font-family: 'Inter', sans-serif;
  }
  .copy-btn:hover { border-color: var(--verde-claro); color: var(--verde-bosque); }

  /* Barra de velocidad */
  .speed-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
    justify-content: center;
    padding: 10px 16px 4px;
    font-size: 11px;
    color: var(--gris);
    max-width: 820px;
    margin: 0 auto;
  }
  .speed-btn {
    background: var(--blanco);
    border: 1.5px solid #DDD6CC;
    border-radius: 12px;
    padding: 3px 10px;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    color: var(--gris);
    font-family: 'Inter', sans-serif;
    transition: all 0.2s;
  }
  .speed-btn.active { background: var(--verde-bosque); color: var(--blanco); border-color: var(--verde-bosque); }

  /* Indicador de soporte TTS */
  .tts-notice {
    text-align: center;
    font-size: 11px;
    color: #AAA;
    padding: 6px 16px 0;
  }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--gris);
    font-size: 14px;
    display: none;
  }

  /* STATS BAR */
  .stats-bar {
    text-align: center;
    font-size: 12px;
    color: var(--gris);
    padding: 12px 16px 0;
  }
  .stats-bar span { color: var(--verde-bosque); font-weight: 600; }

  .hidden { display: none !important; }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: var(--verde-bosque);
    color: var(--blanco);
    font-size: 13px;
    padding: 10px 20px;
    border-radius: 20px;
    transition: transform 0.3s;
    z-index: 999;
    pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  @media (max-width: 500px) {
    .cards-grid { grid-template-columns: 1fr; }
    .category-subtitle { display: none; }
  }
</style>
</head>
